<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo azul redondeado -->
  <rect width="32" height="32" rx="8" fill="#1B6DD4"/>
  <!-- Campana dorada -->
  <g transform="translate(16,16)">
    <!-- Cuerpo campana -->
    <path d="M-5.5 2 Q-6.5 -1 -6 -4 Q-5 -9 0 -9 Q5 -9 6 -4 Q6.5 -1 5.5 2 Z"
          fill="#F5C518"/>
    <!-- Base campana -->
    <rect x="-6.5" y="2" width="13" height="2" rx="1" fill="#F5C518"/>
    <!-- Badajo -->
    <circle cx="0" cy="5.5" r="1.8" fill="#c9a000"/>
    <!-- Brillo -->
    <ellipse cx="-2" cy="-6" rx="1.2" ry="0.7" fill="rgba(255,255,255,0.35)" transform="rotate(-20)"/>
  </g>
</svg>
